version: "3.9"

services:
  # ── Next.js App ────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: brainwave-app
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - NEXT_PUBLIC_CLERK_SIGN_IN_URL=/sign-in
      - NEXT_PUBLIC_CLERK_SIGN_UP_URL=/sign-up
      - NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL=/dashboard/chat
      - NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL=/dashboard/chat
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - ARCJET_KEY=${ARCJET_KEY}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - brainwave-network

  # ── Local PostgreSQL (for local Docker dev only) ───────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: brainwave-postgres
    environment:
      POSTGRES_USER: brainwave
      POSTGRES_PASSWORD: brainwave123
      POSTGRES_DB: brainwave
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - brainwave-network

  # ── Prisma Studio (optional DB viewer) ────────────────────────────────
  prisma-studio:
    image: node:20-alpine
    container_name: brainwave-studio
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    command: npx prisma studio --port 5555
    ports:
      - "5555:5555"
    environment:
      - DATABASE_URL=postgresql://brainwave:brainwave123@postgres:5432/brainwave
    depends_on:
      - postgres
    networks:
      - brainwave-network
    profiles:
      - studio

volumes:
  postgres_data:

networks:
  brainwave-network:
    driver: bridge